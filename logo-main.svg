<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="شعار الحوار الثقافي">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#5b4227"/>
      <stop offset="100%" stop-color="#1f1a16"/>
    </radialGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1a8"/>
      <stop offset="45%" stop-color="#d6a943"/>
      <stop offset="100%" stop-color="#8f651d"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="900" height="900" fill="url(#bg)"/>

  <circle cx="450" cy="450" r="350" fill="none" stroke="url(#gold)" stroke-width="14" filter="url(#shadow)"/>
  <circle cx="450" cy="450" r="310" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.8"/>

  <g fill="none" stroke="url(#gold)" stroke-width="14" filter="url(#shadow)">
    <ellipse cx="450" cy="450" rx="175" ry="78" transform="rotate(0 450 450)"/>
    <ellipse cx="450" cy="450" rx="175" ry="78" transform="rotate(30 450 450)"/>
    <ellipse cx="450" cy="450" rx="175" ry="78" transform="rotate(60 450 450)"/>
    <ellipse cx="450" cy="450" rx="175" ry="78" transform="rotate(90 450 450)"/>
    <ellipse cx="450" cy="450" rx="175" ry="78" transform="rotate(120 450 450)"/>
    <ellipse cx="450" cy="450" rx="175" ry="78" transform="rotate(150 450 450)"/>
  </g>

  <circle cx="450" cy="450" r="105" fill="#2b2118" stroke="url(#gold)" stroke-width="4"/>

  <text x="450" y="205"
        text-anchor="middle"
        font-family="Arial, Tahoma, sans-serif"
        font-size="78"
        font-weight="800"
        fill="url(#gold)"
        filter="url(#shadow)">
    الحوار الثقافي
  </text>

  <text x="450" y="735"
        text-anchor="middle"
        font-family="Arial, Tahoma, sans-serif"
        font-size="54"
        font-weight="700"
        letter-spacing="6"
        fill="url(#gold)"
        filter="url(#shadow)">
    CULTURAL DIALOGUE
  </text>

  <circle cx="180" cy="450" r="18" fill="url(#gold)" filter="url(#shadow)"/>
  <circle cx="720" cy="450" r="18" fill="url(#gold)" filter="url(#shadow)"/>
</svg>
