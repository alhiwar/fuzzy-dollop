<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>تم استلام المادة — الحوار الثقافي</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body{
      background:#f4f1ea;
      font-family:"Segoe UI", Tahoma, sans-serif;
      color:#222;
    }

    .success-box{
      max-width:760px;
      margin:90px auto;
      background:white;
      border-radius:22px;
      padding:45px 30px;
      text-align:center;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
      border:1px solid #eee;
    }

    .icon{
      width:90px;
      height:90px;
      border-radius:50%;
      background:#1f1a16;
      color:#c9a45c;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:3rem;
      margin:0 auto 25px;
    }

    .btn-dark{
      background:#1f1a16;
      border-color:#1f1a16;
    }
  </style>
</head>

<body>

<div class="success-box">

  <div class="icon">
    <i class="bi bi-check-lg"></i>
  </div>

  <h1 class="fw-bold mb-3">تم استلام المادة بنجاح</h1>

  <p class="lead mb-4" style="line-height:2;">
    شكرًا لك على إرسال مقالك أو بحثك إلى موقع الحوار الثقافي.
    سيتم مراجعة المادة بعناية، ثم التواصل معك عند الحاجة.
  </p>

  <div class="d-flex justify-content-center gap-2 flex-wrap">
    <a href="index.html" class="btn btn-dark btn-lg">
      العودة إلى الرئيسية
    </a>

    <a href="submit.html" class="btn btn-outline-dark btn-lg">
      إرسال مادة أخرى
    </a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
