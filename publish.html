<script>
function clean(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function makeParagraphs(text) {
  return String(text || "")
    .split(/\n\s*\n/)
    .map(function(p) {
      return p.trim();
    })
    .filter(function(p) {
      return p.length > 0;
    })
    .map(function(p) {
      return "      <p>" + clean(p).replaceAll("\n", "<br>") + "</p>";
    })
    .join("\n\n");
}
